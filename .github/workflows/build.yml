name: Build Desktop (Windows · macOS · Linux)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: https://www.pytrack.com.br
          # assinatura do updater (gera latest.json + .sig)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PyTrack Desktop ${{ github.ref_name }}"
          releaseBody: "Instaladores para Windows (.msi/.exe), macOS (.dmg) e Linux (.AppImage/.deb)."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # avisa todos os usuários da plataforma sobre a nova versão (uma única vez)
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'desktop-v')
    steps:
      - name: Broadcast nova versão
        run: |
          VER="${GITHUB_REF_NAME#desktop-v}"
          curl -s -X POST "https://www.pytrack.com.br/api/broadcast" \
            -H "Authorization: Bearer ${{ secrets.BROADCAST_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"🖥️ App Desktop v${VER} disponível!\",\"body\":\"Uma nova versão do PyTrack Desktop foi publicada para Windows, macOS e Linux. Atualize ou baixe agora.\",\"link\":\"/apps\",\"type\":\"success\"}"
