name: Build & Push Docker (GHCR)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Aguardar a release (instaladores) ficar pronta
        run: sleep 60

      - name: Extrair versão da tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pytrack-desktop:latest
            ghcr.io/${{ github.repository_owner }}/pytrack-desktop:${{ steps.ver.outputs.version }}
