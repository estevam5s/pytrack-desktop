name: Build & Push Docker (GHCR)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Aguardar a release (instaladores) ficar pronta
        if: startsWith(github.ref_name, 'desktop-v')
        run: sleep 90

      - name: Extrair versão (tag ou última release)
        id: ver
        run: |
          REF="${GITHUB_REF_NAME}"
          if echo "$REF" | grep -q '^desktop-v'; then
            echo "version=${REF#desktop-v}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -fsSL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | grep '"tag_name"' | head -1 | cut -d'"' -f4)
            echo "version=${TAG#desktop-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pytrack-desktop:latest
            ghcr.io/${{ github.repository_owner }}/pytrack-desktop:${{ steps.ver.outputs.version }}
